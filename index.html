<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0B10" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Readex+Pro:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <title>Madar — AI Revenue Co-Pilot for Short-Term Rentals</title>
    <meta name="description" content="Madar uses AI to optimize pricing, forecast demand, and maximize revenue for short-term rental hosts in Saudi Arabia." />
  </head>
  <body>
    <script>
      // Anti-FOUC: resolve the theme (stored preference or system) and stamp the
      // class on <html> before first paint, so neither theme ever flashes.
      (function () {
        try {
          var pref = localStorage.getItem('madar_theme');
          var resolved =
            pref === 'light' || pref === 'dark'
              ? pref
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark';
          var cl = document.documentElement.classList;
          cl.add(resolved);
          cl.remove(resolved === 'dark' ? 'light' : 'dark');
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
